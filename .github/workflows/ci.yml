name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs on the same ref to save Actions minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node: ['18', '20', '22']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Verify zero dependencies
        run: node tools/check-zero-deps.mjs

      - name: Syntax check
        run: |
          node --check src/index.js
          node --check src/client.js
          node --check src/http.js
          node --check src/auth.js
          node --check src/errors.js
          node --check src/resources/customers.js
          node --check src/resources/invoices.js
          node --check src/resources/products.js
          node --check src/resources/vouchers.js
          node --check src/resources/credit-notes.js
          node --check src/resources/payments.js
          node --check src/resources/account-statements.js

      - name: Run tests
        run: npm test
